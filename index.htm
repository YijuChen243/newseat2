<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>導師班級座任安排系統 (優化版)</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { 
            --fixed: #fff9db; --fixed-border: #fab005; --primary: #228be6; 
            --bg: #f8f9fa; --success: #40c057; --warning: #ff922b; --purple: #7950f2;
            --a4-width: 800px; --a4-height: 1132px;
            --wood: #d2b48c;
        }
        
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 側邊欄 */
        .sidebar { width: 380px; background: white; padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; z-index: 10; }
        .config-group { margin-bottom: 15px; padding: 12px; border-radius: 10px; background: #f1f3f5; border: 1px solid #dee2e6; }
        h3 { margin-top: 0; font-size: 16px; color: #212529; border-left: 5px solid var(--primary); padding-left: 10px; margin-bottom: 12px; }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #495057; font-size: 14px; }
        input, textarea, select { 
            width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px;
        }
        textarea { height: 100px; font-family: monospace; }
        
        button { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-new { background: #fa5252; color: white; }
        .btn-cloud { background: var(--purple); color: white; }
        .btn-load { background: var(--success); color: white; }
        .btn-shuffle { background: var(--primary); color: white; font-size: 18px; margin: 10px 0; }
        .btn-img { background: var(--warning); color: white; }
        .btn-out { background: #adb5bd; color: white; margin-top: auto; }

        /* 主畫面 A4 容器 */
        .main-content { flex-grow: 1; display: flex; justify-content: center; overflow: auto; padding: 20px; background: #525659; }
        
        #capture-area { 
            width: var(--a4-width); 
            height: var(--a4-height); 
            background: white; 
            padding: 30px 40px; 
            display: flex; 
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        #class-title-display { text-align: center; font-size: 1.8rem; margin: 0 0 10px 0; color: #000; font-weight: 900; }
        
        /* 可愛講桌設計 */
        .teacher-area { display: flex; justify-content: center; margin-bottom: 20px; }
        .teacher-desk-wrapper {
            position: relative;
            width: 200px; height: 45px;
            background: linear-gradient(to bottom, #8b4513, #a0522d);
            border: 2px solid #5d2e0a;
            border-radius: 8px 8px 4px 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 1.2rem;
        }
        .teacher-desk-wrapper::after {
            content: ""; position: absolute; bottom: -5px; width: 110%; height: 5px; background: #5d2e0a; border-radius: 2px;
        }

        .classroom-layout { 
            display: flex; 
            flex-grow: 1; 
            gap: 15px; 
            max-height: calc(var(--a4-height) - 480px); 
        }
        
        .grid-container { flex: 0 0 82%; display: flex; justify-content: center; align-items: flex-start; }
        .grid { display: grid; gap: 8px; width: 100%; justify-content: center; }
        
        /* 座位格雙行設計 */
        .seat { 
            aspect-ratio: 4 / 3.5; border: 1.5px solid #000; border-radius: 4px; 
            display: flex; flex-direction: column; cursor: pointer; position: relative;
            box-sizing: border-box; background: #fff; overflow: hidden;
        }
        .seat.is-fixed { background: var(--fixed); }
        .seat-no-row { 
            height: 35%; background: #f1f3f5; border-bottom: 1px solid #000; 
            display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold;
        }
        .seat-name-row { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            font-size: 1rem; font-weight: bold; padding: 2px; text-align: center;
        }
        .lock-icon { position: absolute; top: 1px; right: 2px; font-size: 8px; color: #d63031; }

        .attendance-list { 
            flex: 0 0 18%; border: 1.5px solid #000; padding: 5px; 
            display: flex; flex-direction: column; font-size: 11px; box-sizing: border-box;
        }
        .attendance-header { text-align: center; font-weight: bold; border-bottom: 1.5px solid #000; margin-bottom: 5px; font-size: 13px; }
        .attendance-items-wrapper { display: flex; flex-direction: column; flex-wrap: wrap; height: 100%; }
        .attendance-item { display: flex; border-bottom: 1px solid #ddd; padding: 1px 0; }
        .att-no { width: 18px; font-weight: bold; flex-shrink: 0; }
        .att-name { flex: 1; white-space: nowrap; overflow: hidden; }

        /* 幹部區設計 */
        .officer-section { 
            margin-top: 15px; border: 1.5px solid #000; padding: 8px;
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
        }
        .officer-box { border: 1px dashed #adb5bd; padding: 4px; text-align: center; font-size: 11px; height: 40px; display: flex; flex-direction: column; justify-content: center; }
        .officer-title { font-weight: bold; color: #495057; border-bottom: 1px solid #eee; margin-bottom: 2px; }
        .officer-name { font-size: 12px; font-weight: bold; }

        .info-footer { 
            margin-top: 10px; height: 100px; border: 1.5px solid #000; padding: 10px;
            font-size: 13px; white-space: pre-wrap; overflow: hidden;
        }
        .info-footer::before { content: "導師備註："; display: block; font-weight: bold; text-decoration: underline; }

        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #auth-overlay.hidden { display: none; }
        .auth-box { background: white; padding: 40px; border-radius: 12px; width: 400px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title" style="text-align: center;">導師班級管理系統</h2>
        <input type="email" id="auth-email" placeholder="電子信箱">
        <input type="password" id="auth-password" placeholder="密碼">
        <button class="btn-new" id="btn-auth-main" onclick="handleAuth()" style="background: var(--primary);">進入系統</button>
        <div style="text-align: center; margin-top: 15px;">
            <span id="auth-switch-text" onclick="toggleAuthMode()" style="color: var(--primary); cursor: pointer; text-decoration: underline;">註冊新帳號</span>
        </div>
    </div>
</div>

<div class="sidebar">
    <div class="config-group">
        <h3>🏫 檔案管理</h3>
        <button class="btn-new" onclick="createNewClass()">➕ 建立新班級</button>
        <select id="classDropdown"><option value="">-- 讀取雲端班級 --</option></select>
        <div style="display: flex; gap: 5px;">
            <button class="btn-load" onclick="loadFromDropdown()">📂 載入</button>
            <button class="btn-cloud" onclick="saveToCloud()">☁️ 儲存</button>
        </div>
        <button class="btn-img" onclick="downloadImage()">🖼️ 匯出 A4 座位圖片</button>
    </div>

    <div class="config-group">
        <h3>✏️ 佈局與名單</h3>
        <label>班級名稱</label>
        <input type="text" id="classTitle" oninput="syncAll()" placeholder="例如：資二甲">
        <div style="display: flex; gap: 10px;">
            <div><label>欄</label><input type="number" id="cols" value="7" min="1" max="7" onchange="initGrid()"></div>
            <div><label>列</label><input type="number" id="rows" value="6" min="1" max="7" onchange="initGrid()"></div>
        </div>
        <label>學生名單 (座號 姓名)</label>
        <textarea id="studentList" oninput="updateAttendanceList()" placeholder="01 張三&#10;02 李四"></textarea>
        <button class="btn-shuffle" onclick="shuffleNonFixed()">🎲 隨機排位</button>
    </div>

    <div class="config-group">
        <h3>👔 班級幹部 (12位)</h3>
        <div id="officer-inputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <!-- 自動生成 12 個輸入框 -->
        </div>
    </div>

    <div class="config-group">
        <h3>📝 備註</h3>
        <textarea id="infoInput" oninput="syncAll()"></textarea>
    </div>

    <button class="btn-out" onclick="handleLogout()">🚪 登出系統</button>
</div>

<div class="main-content">
    <div id="capture-area">
        <h1 id="class-title-display">班級座位表</h1>
        <div class="teacher-area"><div class="teacher-desk-wrapper">講 桌</div></div>
        
        <div class="classroom-layout">
            <div class="grid-container"><div id="grid" class="grid"></div></div>
            <div class="attendance-list">
                <div class="attendance-header">座號名條</div>
                <div id="attendance-items" class="attendance-items-wrapper"></div>
            </div>
        </div>

        <div class="officer-section" id="officer-display">
            <!-- 自動生成 12 個顯示盒 -->
        </div>

        <div id="info-display" class="info-footer"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let isRegisterMode = false;
    const officerTitles = ["班長", "副班長", "風紀", "學藝", "衛生", "體育", "總務", "環保", "輔導", "資訊", "圖書", "服務"];

    // 初始化幹部輸入與顯示區
    function initOfficers() {
        const inputArea = document.getElementById('officer-inputs');
        const displayArea = document.getElementById('officer-display');
        inputArea.innerHTML = '';
        displayArea.innerHTML = '';
        
        officerTitles.forEach((title, i) => {
            const inp = document.createElement('input');
            inp.type = "text"; inp.placeholder = title;
            inp.id = `off-inp-${i}`;
            inp.oninput = () => { document.getElementById(`off-disp-${i}`).innerText = inp.value; };
            inputArea.appendChild(inp);

            const box = document.createElement('div');
            box.className = 'officer-box';
            box.innerHTML = `<div class="officer-title">${title}</div><div class="officer-name" id="off-disp-${i}"></div>`;
            displayArea.appendChild(box);
        });
    }

    const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        document.getElementById('auth-overlay').classList.toggle('hidden', !!user);
        if (user) {
            initOfficers();
            refreshClassList();
            initGrid();
        }
    });

    window.toggleAuthMode = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "註冊新帳號" : "導師班級管理系統";
        document.getElementById('btn-auth-main').innerText = isRegisterMode ? "立即註冊" : "進入系統";
    };

    window.handleAuth = async () => {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-password').value;
        try {
            if (isRegisterMode) await createUserWithEmailAndPassword(auth, e, p);
            else await signInWithEmailAndPassword(auth, e, p);
        } catch (err) { alert(err.message); }
    };

    window.handleLogout = () => signOut(auth);

    window.syncAll = () => {
        document.getElementById('class-title-display').innerText = document.getElementById('classTitle').value || "班級座位表";
        document.getElementById('info-display').innerText = document.getElementById('infoInput').value;
    };

    window.initGrid = () => {
        const gridEl = document.getElementById('grid');
        let c = parseInt(document.getElementById('cols').value) || 7;
        let r = parseInt(document.getElementById('rows').value) || 6;
        gridEl.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
        gridEl.innerHTML = '';
        
        for (let i = 0; i < c * r; i++) {
            const seat = document.createElement('div');
            seat.className = 'seat empty';
            seat.innerHTML = `<div class="seat-no-row"></div><div class="seat-name-row"></div>`;
            seat.onclick = () => {
                const oldName = seat.querySelector('.seat-name-row').innerText;
                const oldNo = seat.querySelector('.seat-no-row').innerText;
                const name = prompt("編輯姓名：", oldName);
                if (name === null) return;
                const no = prompt("編輯座號：", oldNo);
                updateSeat(seat, name.trim(), no ? no.trim() : "", seat.classList.contains('is-fixed'));
            };
            seat.oncontextmenu = (e) => {
                e.preventDefault();
                seat.classList.toggle('is-fixed');
                updateLockIcon(seat);
            };
            gridEl.appendChild(seat);
        }
    };

    function updateSeat(seat, name, no, fixed) {
        seat.querySelector('.seat-name-row').innerText = name;
        seat.querySelector('.seat-no-row').innerText = no;
        seat.className = name ? ('seat occupied' + (fixed ? ' is-fixed' : '')) : 'seat empty';
        updateLockIcon(seat);
    }

    function updateLockIcon(seat) {
        const old = seat.querySelector('.lock-icon');
        if (old) old.remove();
        if (seat.classList.contains('is-fixed')) seat.insertAdjacentHTML('beforeend', '<span class="lock-icon">📌</span>');
    }

    window.updateAttendanceList = () => {
        const listText = document.getElementById('studentList').value;
        const container = document.getElementById('attendance-items');
        container.innerHTML = '';
        let students = listText.split('\n').map(s => s.trim()).filter(s => s !== "");
        students.forEach(s => {
            const match = s.match(/^(\d+)\s*(.*)/);
            const no = match ? match[1] : "--";
            const name = match ? match[2] : s;
            const div = document.createElement('div');
            div.className = 'attendance-item';
            div.innerHTML = `<span class="att-no">${no}</span><span class="att-name">${name}</span>`;
            container.appendChild(div);
        });
    };

    window.shuffleNonFixed = () => {
        const students = document.getElementById('studentList').value.split('\n').map(s => s.trim()).filter(s => s !== "");
        const allSeats = Array.from(document.querySelectorAll('.seat'));
        const availableSeats = allSeats.filter(s => !s.classList.contains('is-fixed'));
        if (students.length > availableSeats.length) return alert('座位不足！');
        
        students.sort(() => Math.random() - 0.5);
        availableSeats.forEach(s => updateSeat(s, "", "", false));
        students.forEach((s, i) => {
            const match = s.match(/^(\d+)\s*(.*)/);
            updateSeat(availableSeats[i], match ? match[2] : s, match ? match[1] : "", false);
        });
    };

    window.saveToCloud = async () => {
        if (!currentUser) return;
        const title = document.getElementById('classTitle').value.trim();
        if (!title) return alert("請輸入班級名稱");
        
        const officers = Array.from({length: 12}).map((_, i) => document.getElementById(`off-inp-${i}`).value);
        const layout = Array.from(document.querySelectorAll('.seat')).map(s => ({
            name: s.querySelector('.seat-name-row').innerText,
            no: s.querySelector('.seat-no-row').innerText,
            isFixed: s.classList.contains('is-fixed')
        }));

        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'classes', title), {
            cols: document.getElementById('cols').value,
            rows: document.getElementById('rows').value,
            rawList: document.getElementById('studentList').value,
            info: document.getElementById('infoInput').value,
            officers,
            layout
        });
        alert('儲存成功');
        refreshClassList();
    };

    async function refreshClassList() {
        const dropdown = document.getElementById('classDropdown');
        dropdown.innerHTML = '<option value="">-- 讀取雲端班級 --</option>';
        const snap = await getDocs(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'classes'));
        snap.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id; opt.textContent = d.id;
            dropdown.appendChild(opt);
        });
    }

    window.loadFromDropdown = async () => {
        const title = document.getElementById('classDropdown').value;
        if (!title) return;
        const docSnap = await getDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'classes', title));
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('classTitle').value = title;
            document.getElementById('cols').value = data.cols;
            document.getElementById('rows').value = data.rows;
            document.getElementById('studentList').value = data.rawList;
            document.getElementById('infoInput').value = data.info || "";
            initGrid();
            syncAll();
            updateAttendanceList();
            
            if (data.officers) {
                data.officers.forEach((val, i) => {
                    document.getElementById(`off-inp-${i}`).value = val;
                    document.getElementById(`off-disp-${i}`).innerText = val;
                });
            }
            const seats = document.querySelectorAll('.seat');
            data.layout.forEach((s, i) => { if(seats[i]) updateSeat(seats[i], s.name, s.no, s.isFixed); });
        }
    };

    window.createNewClass = () => location.reload();

    window.downloadImage = () => {
        html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `${document.getElementById('classTitle').value || '座位表'}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    };
</script>
</body>
</html>
