<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== ★★★ 重要設定：在此填入您的管理者信箱 ★★★ =====
const ADMIN_EMAIL = "yijuchen243@gmail.com"; 

// ===== 你的 Firebase 設定 =====
const firebaseConfig = {
  apiKey: "AIzaSyAzn6LMMuRuDdes0u1pQZZapgCIZi-ivZg",
  authDomain: "teachseat-e04a1.firebaseapp.com",
  projectId: "teachseat-e04a1",
  storageBucket: "teachseat-e04a1.firebasestorage.app",
  messagingSenderId: "91449526838",
  appId: "1:91449526838:web:802655d5f909f8e840a697"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ===== 常數 =====
const OFFICERS = ["班長","副班長","風紀","學藝","衛生(內)","衛生(外)","體育","事務","環保","輔導","實習","圖書","康樂","評分員",];

// ===== 狀態 =====
let layout = [];
let cols = 6, rows = 5;
let savedClasses = [];
let editingIdx = null;
let draggedIdx = null;
let currentUser = null;
let isLoginMode = true; 
let currentEditingUid = null; 
let unsubscribeSnapshot = null; 

// ===== 初始化 Lucide =====
lucide.createIcons();

// ===== 幹部欄位初始化 =====
const officersGrid = document.getElementById('officersGrid');
OFFICERS.forEach((title, i) => {
  const div = document.createElement('div');
  div.innerHTML = `<div class="text-[9px] text-gray-400 ml-1 font-bold mb-0.5">${title}</div>
    <input type="text" id="officer_${i}" class="w-full p-1.5 border rounded text-xs" placeholder="${title}"/>`;
  officersGrid.appendChild(div);
});

// ===== 網格初始化 =====
function initLayout() {
  const count = cols * rows;
  const prev = [...layout];
  layout = Array.from({length: count}, (_, i) => prev[i] || {no:'', name:'', fixed:false});
}

function renderGrid() {
  const grid = document.getElementById('seatGrid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';
  
  const nameFontSize = cols >= 7 ? '14px' : (cols === 6 ? '17px' : '20px');
  const noFontSize = cols >= 7 ? '12px' : '14px';

  layout.forEach((seat, i) => {
    const div = document.createElement('div');
    div.className = `seat border-2 border-black flex flex-col relative group ${seat.fixed ? 'bg-yellow-50' : 'bg-white'}`;
    div.style.aspectRatio = '1/0.82';
    div.draggable = !!seat.name;
    div.dataset.idx = i;
    
    div.innerHTML = `
      <div class="h-[30%] border-b-2 border-black flex items-center justify-center bg-slate-100 font-bold text-center pb-[10px]" style="font-size:${noFontSize}">
        ${seat.no}
      </div>
      <div class="h-[70%] flex items-center justify-center px-1 overflow-hidden font-black text-center whitespace-nowrap pb-[16px]" style="font-size:${nameFontSize}">
        ${seat.name}
      </div>
      <button class="lock-btn absolute top-0 right-0 p-0.5 opacity-0 group-hover:opacity-100 no-print ${seat.fixed?'text-amber-500':'text-slate-300'}" data-idx="${i}" style="z-index: 10;" data-html2canvas-ignore="true">
        ${seat.fixed ? '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>'}
      </button>`;
      
    div.addEventListener('click', (e) => {
      if (e.target.closest('.lock-btn')) return;
      openModal(i);
    });
    div.querySelector('.lock-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      layout[i].fixed = !layout[i].fixed;
      renderGrid();
    });
    div.addEventListener('dragstart', (e) => {
      draggedIdx = i;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', (e) => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (draggedIdx === null || draggedIdx === i) return;
      const tmp = {...layout[draggedIdx]};
      layout[draggedIdx] = {...layout[i]};
      layout[i] = tmp;
      draggedIdx = null;
      renderGrid();
    });
    grid.appendChild(div);
  });
  renderOfficersTable();
  renderNameList();
}

function renderOfficersTable() {
  const table = document.getElementById('officersTable');
  table.innerHTML = '';
  OFFICERS.forEach((title, i) => {
    const val = document.getElementById(`officer_${i}`)?.value || '';
    const cell = document.createElement('div');
    cell.className = 'border-r-[3px] border-b-[3px] border-black px-1.5 pt-[2px] pb-[14px] min-h-[55px] text-center bg-white flex flex-col items-center justify-center gap-1';
    
    cell.innerHTML = `
      <div class="text-[11px] font-bold text-gray-500 leading-snug">${title}</div>
      <div class="text-[15px] font-bold w-full leading-snug break-words">${val}</div>`;
    table.appendChild(cell);
  });
}

function renderNameList() {
  const el = document.getElementById('nameList');
  const panel = document.getElementById('nameListPanel');
  const raw = document.getElementById('studentList').value;
  const lines = raw.split('\n').filter(l=>l.trim());
  
  // 根據欄數動態調整名單欄寬與字體大小，避免被座位格遮蓋
  const panelWidth = cols >= 6 ? 80 : (cols === 5 ? 90 : 105);
  const fontSize = cols >= 6 ? 11 : (cols === 5 ? 12 : 13);
  if (panel) {
    panel.style.width = panelWidth + 'px';
    panel.style.minWidth = panelWidth + 'px';
  }
  
  el.innerHTML = lines.map(l => {
    const p = l.trim().split(/\s+/);
    const str = p[0] + (p.length > 1 ? ' ' + p.slice(1).join(' ') : '');
    return `<div class="border-b border-slate-200 pt-[1px] pb-[3px] px-1 truncate text-center leading-tight" style="font-size:${fontSize}px">${str}</div>`;
  }).join('');
}

// ===== 動態更新標題/備註預覽 =====

// ===== 管理者後台系統 =====
document.getElementById('adminBtn').onclick = async () => {
  document.getElementById('adminModal').classList.remove('hidden');
  const listEl = document.getElementById('adminClassList');
  listEl.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-500 font-bold"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i>資料讀取中...</td></tr>';
  lucide.createIcons();

  try {
    const q = collectionGroup(db, 'classes');
    const querySnapshot = await getDocs(q);
    const allDocs = [];
    
    querySnapshot.forEach((doc) => {
      const teacherUid = doc.ref.parent.parent.id; 
      allDocs.push({ id: doc.id, teacherUid, ...doc.data() });
    });

    allDocs.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    window.adminLoadedClasses = allDocs;

    let html = '';
    allDocs.forEach((data, index) => {
      const dateStr = data.updatedAt ? new Date(data.updatedAt).toLocaleString('zh-TW', { hour12: false }) : '未知時間';
      const emailStr = data.teacherEmail || '未知帳號(舊版存檔)';
      html += `
        <tr class="hover:bg-slate-50 transition border-b border-slate-100">
          <td class="p-3 text-slate-700 font-medium">${emailStr}</td>
          <td class="p-3 font-bold text-slate-800">${data.title}</td>
          <td class="p-3 text-xs text-slate-400">${dateStr}</td>
          <td class="p-3 text-center">
            <button class="bg-amber-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-amber-600 transition shadow-sm" onclick="loadAdminClass(${index})">
              載入幫助
            </button>
          </td>
        </tr>
      `;
    });
    
    if(allDocs.length === 0) {
      html = '<tr><td colspan="4" class="p-6 text-center text-slate-500">目前系統中尚無任何班級資料</td></tr>';
    }
    listEl.innerHTML = html;

  } catch(e) {
    listEl.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-red-500">讀取失敗！請確認 Firestore 的 Rules 是否已正確設定。<br><span class="text-xs text-slate-400 mt-2 block">${e.message}</span></td></tr>`;
  }
};

document.getElementById('closeAdminModal').onclick = () => {

window.loadAdminClass = (index) => {

// ===== 隨機排位 =====
document.getElementById('shuffleBtn').onclick = () => {
  const students = document.getElementById('studentList').value.split('\n')
    .filter(l=>l.trim()).map(l => {
      const p = l.trim().split(/\s+/);
      return {no: p[0]||'', name: p.slice(1).join(' ')||''};
    }).sort(() => Math.random()-0.5);
    
  // 清空所有非固定的座位
  layout.forEach((seat, i) => {
    if (!seat.fixed) {
      layout[i] = {...seat, no:'', name:''};
    }
  });

  // 產生由下到上，由左至右的索引順序
  let orderedIndices = [];
  for (let r = rows - 1; r >= 0; r--) {
    for (let c = 0; c < cols; c++) {
      orderedIndices.push(r * cols + c);
    }
  }

  // 依照新順序將學生填入
  let si = 0;
  for (let idx of orderedIndices) {
    if (!layout[idx].fixed && si < students.length) {
      layout[idx] = {...layout[idx], no: students[si].no, name: students[si].name};
      si++;
    }
  }
  
  renderGrid();
};

// ===== 獨立的重設與清理畫面功能 =====

  document.getElementById('classTitle').value = '114學年度第2學期 某某班 座位表';
  document.getElementById('previewTitle').textContent = '114學年度第1學期 某某班 座位表';
  document.getElementById('studentList').value = '';
  document.getElementById('memoInput').value = '';
  document.getElementById('memoDisplay').innerHTML = `暫無說明事項。`;
  document.getElementById('savedClassSelect').value = ''; 
  OFFICERS.forEach((_,i) => { const el = document.getElementById(`officer_${i}`); if(el) el.value=''; });
  layout = layout.map(s => ({no:'', name:'', fixed:false}));
  renderGrid();
}

document.getElementById('resetBtn').onclick = () => resetApp(false);

// ===== 密碼顯示切換 =====
document.getElementById('togglePwd').onclick = () => {

  const eyeOff = document.getElementById('eyeOffIcon');

// ===== 登入/註冊模式切換 =====
function showMessage(msg, isError = true) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.className = `text-xs mt-3 text-center ${isError ? 'text-red-500' : 'text-green-600'} whitespace-pre-wrap`;
  el.classList.remove('hidden');
}

document.getElementById('switchAuthModeBtn').onclick = () => {
  isLoginMode = !isLoginMode;
  document.getElementById('authError').classList.add('hidden'); 
  document.getElementById('passwordInput').value = ''; 
  
  const modeLabel = document.getElementById('authModeLabel');
  const primaryBtn = document.getElementById('primaryAuthBtn');
  const switchBtn = document.getElementById('switchAuthModeBtn');
  const forgotPwdWrap = document.getElementById('forgotPwdWrapper');

  if (isLoginMode) {
    modeLabel.textContent = '導師專用 - 登入';
    primaryBtn.textContent = '登入';
    primaryBtn.classList.replace('bg-green-600', 'bg-blue-600');
    primaryBtn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
    switchBtn.textContent = '還沒有帳號？註冊新帳號';
    forgotPwdWrap.style.display = 'flex'; 
  } else {
    modeLabel.textContent = '導師專用 - 註冊';
    primaryBtn.textContent = '確定註冊';
    primaryBtn.classList.replace('bg-blue-600', 'bg-green-600');
    primaryBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
    switchBtn.textContent = '已有帳號？返回登入';
    forgotPwdWrap.style.display = 'none'; 
  }
};

// 忘記密碼功能
document.getElementById('forgotPwdBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value;
  if (!email) return showMessage('請先在上方輸入您的「電子郵件」帳號', true);
  
  try {

  } catch(e) {
    showMessage('發送重設信失敗：' + e.message, true);

};

// ===== 身份驗證整合處理 =====
document.getElementById('primaryAuthBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value;
  const pwd = document.getElementById('passwordInput').value;
  if (!email || !pwd) return showMessage('請填寫帳號與密碼', true);

  if (isLoginMode) {
    try { 
      await signInWithEmailAndPassword(auth, email, pwd); 
    } catch(e) { 
      showMessage('登入失敗：' + (e.code === 'auth/invalid-credential' ? '帳號或密碼錯誤' : e.message), true); 
    }
  } else {
    if (pwd.length < 6) return showMessage('密碼至少需要 6 個字元', true);
    try { 
      await createUserWithEmailAndPassword(auth, email, pwd); 
    } catch(e) { 
      if (e.code === 'auth/admin-restricted-operation') {
        showMessage('註冊失敗：Firebase 後台未開放註冊。請至 Firebase Console -> Authentication 設定啟用使用者註冊功能。', true);
      } else if (e.code === 'auth/email-already-in-use') {
        showMessage('註冊失敗：此信箱已經被註冊過了。', true);
      } else {
        showMessage('註冊失敗：' + e.message, true); 
      }
    }
  }
};

document.getElementById('anonBtn').onclick = async () => {
  try { await signInAnonymously(auth); }
  catch(e) { showMessage('進入失敗：' + e.message, true); }
};

document.getElementById('logoutBtn').onclick = () => {
  if (unsubscribeSnapshot) {
    unsubscribeSnapshot();
    unsubscribeSnapshot = null;
  }
  signOut(auth);
};

// ===== Auth 狀態監聽 =====
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  
  if (unsubscribeSnapshot) {
    unsubscribeSnapshot();
    unsubscribeSnapshot = null;
  }

  if (user) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('flex');
    document.getElementById('userEmail').textContent = user.isAnonymous ? '訪客' : user.email;

    if (!user.isAnonymous) {
      document.getElementById('cloudSection').classList.remove('opacity-40', 'pointer-events-none');
      document.getElementById('changePwdBtn').classList.remove('hidden'); 
      
      if (user?.email === ADMIN_EMAIL) {
        document.getElementById('adminBtn').classList.remove('hidden');
      } else {
        document.getElementById('adminBtn').classList.add('hidden');
      }

      const q = collection(db, 'seatapp', user.uid, 'classes');
      
      unsubscribeSnapshot = onSnapshot(q, (snap) => {
        if (!currentEditingUid) {
          savedClasses = [];
          snap.forEach(d => savedClasses.push({id: d.id, ...d.data()}));
          const sel = document.getElementById('savedClassSelect');
          const cur = sel.value;
          sel.innerHTML = '<option value="">-- 選擇存檔 --</option>';
          savedClasses.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id; opt.textContent = c.id;
            sel.appendChild(opt);
          });
          sel.value = cur;
        }
      }, (error) => {
        console.error('Firestore 存檔讀取錯誤：', error);
        if(error.code === 'permission-denied') {
          console.warn('您的 Firestore 安全規則可能設定不正確，或權限不足。');
        }
      });
    } else {
      document.getElementById('cloudSection').classList.add('opacity-40', 'pointer-events-none');
      document.getElementById('changePwdBtn').classList.add('hidden'); 
      document.getElementById('adminBtn').classList.add('hidden');
    }

    initLayout();
    renderGrid();
    lucide.createIcons();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('flex');
  }
});

// ===== 雲端儲存 =====
document.getElementById('saveBtn').onclick = async () => {
  if (!currentUser || currentUser.isAnonymous) {
    alert('請先登入才能使用雲端儲存');
    return;
  }
  
  const title = document.getElementById('classTitle').value.trim();
  if (!title) {
    alert('請輸入班級名稱');
    return;
  }
  
  const officerVals = OFFICERS.map((_,i) => document.getElementById(`officer_${i}`)?.value||'');
  
  const isHelping = (currentUser?.email === ADMIN_EMAIL && currentEditingUid !== null);
  const targetUid = isHelping ? currentEditingUid : currentUser.uid;
  const targetEmail = isHelping ? document.getElementById('adminEditTargetEmail').textContent : currentUser?.email;

  try {
    await setDoc(doc(db, 'seatapp', targetUid, 'classes', title), {
      title, cols, rows,
      studentListRaw: document.getElementById('studentList').value,
      memo: document.getElementById('memoInput').value,
      officers: officerVals, layout,
      updatedAt: Date.now(),
      teacherEmail: targetEmail,
      teacherUid: targetUid
    });
    alert('儲存成功！' + (isHelping ? '\n(檔案已成功覆蓋回該導師的帳號)' : ''));
  } catch(e) {
    console.error(e);
    alert('儲存失敗：' + e.message + '\n\n如果是管理者，請務必確認 Firebase Rules 已正確設定！');
  }
};

// ===== 刪除存檔 =====
document.getElementById('deleteClassBtn').onclick = async () => {
  if (!currentUser || currentUser.isAnonymous) {
    alert('請先登入才能執行刪除動作');
    return;
  }
  
  // 優先抓取下拉選單的值，如果沒選則抓取目前畫面的班級名稱
  const selectVal = document.getElementById('savedClassSelect').value;
  const titleInput = document.getElementById('classTitle').value.trim();
  const title = selectVal || titleInput;
  
  if (!title) {
    alert('請先選擇要刪除的存檔，或輸入完整的班級名稱！');
    return;
  }

  if (!confirm(`警告：確定要永久刪除「${title}」這個存檔嗎？\n此動作無法復原！`)) return;

  const isHelping = (currentUser?.email === ADMIN_EMAIL && currentEditingUid !== null);
  const targetUid = isHelping ? currentEditingUid : currentUser.uid;

  try {
    await deleteDoc(doc(db, 'seatapp', targetUid, 'classes', title));
    
    alert(`成功刪除班級「${title}」！`);
    
    // 如果是在管理者幫助模式下刪除的，強制退出並重設畫面
    if (isHelping) {
      document.getElementById('exitAdminEditBtn').click();
    } else {
      // 刪除自己的檔案後清空畫面
      resetApp(true);
    }
  } catch(e) {
    console.error(e);
    alert('刪除失敗：權限不足或網路問題。\n詳細錯誤：' + e.message);
  }
};

// ===== 載入存檔 =====
document.getElementById('loadBtn').onclick = () => {
  const id = document.getElementById('savedClassSelect').value;
  const data = savedClasses.find(c => c.id === id);
  if (!data) return alert('請選擇存檔');
  document.getElementById('classTitle').value = data.title;
  document.getElementById('previewTitle').textContent = data.title;
  cols = data.cols; rows = data.rows;
  document.getElementById('colsInput').value = cols;
  document.getElementById('rowsInput').value = rows;
  document.getElementById('studentList').value = data.studentListRaw || '';
  document.getElementById('memoInput').value = data.memo || '';
  document.getElementById('memoDisplay').innerHTML = `${data.memo || '暫無說明事項。'}`;
  (data.officers||[]).forEach((v,i) => { const el = document.getElementById(`officer_${i}`); if(el) el.value=v; });
  layout = data.layout || [];
  renderGrid();
  renderNameList();
};
