<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>座位安排系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  @media print { .no-print { display: none !important; } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  body { font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; }
  .dragging { opacity: 0.3; }
  .drag-over { border-color: #3b82f6 !important; background: #eff6ff !important; }
</style>
</head>
<body class="bg-slate-100">

<!-- 登入畫面 -->
<div id="authScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl">
    <h2 class="text-2xl font-bold mb-2 text-slate-800 text-center">座位安排系統</h2>
    <p class="text-xs text-slate-400 text-center mb-6">導師專用</p>
    <div class="space-y-3">
      <input id="emailInput" type="email" placeholder="電子郵件" class="w-full p-3 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
      <div class="relative">
        <input id="passwordInput" type="password" placeholder="密碼" class="w-full p-3 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none pr-10"/>
        <button id="togglePwd" type="button" class="absolute right-3 top-2.5 text-xl hover:scale-110 transition-transform" title="顯示/隱藏密碼">
          <span id="eyeIcon">🙈</span>
          <span id="eyeOffIcon" style="display:none">🐵</span>
        </button>
      </div>
      <button id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition text-sm">登入</button>
      <button id="registerBtn" class="w-full bg-slate-100 text-slate-700 py-2 rounded-lg font-bold hover:bg-slate-200 transition text-sm">註冊新帳號</button>
      <button id="anonBtn" class="w-full text-slate-400 py-2 rounded-lg text-xs hover:text-slate-600 transition">不登入，直接使用（資料不儲存）</button>
    </div>
    <p id="authError" class="text-red-500 text-xs mt-3 text-center hidden"></p>
  </div>
</div>

<!-- 主應用 -->
<div id="mainApp" class="hidden flex h-screen overflow-hidden">

  <!-- 側邊欄 -->
  <aside class="no-print w-[320px] min-w-[320px] bg-white border-r shadow-lg overflow-y-auto flex flex-col z-10">
    <div class="p-4 bg-slate-800 text-white flex justify-between items-center sticky top-0 z-20">
      <h1 class="text-base font-bold">控制面板</h1>
      <div class="flex gap-2">
        <span id="userEmail" class="text-xs text-slate-400 self-center"></span>
        <button id="logoutBtn" class="p-1.5 hover:bg-slate-700 rounded-full transition" title="登出">
          <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <div class="p-4 space-y-5 pb-16">

      <!-- 雲端存檔 -->
      <div class="bg-slate-50 p-3 rounded-xl border space-y-2" id="cloudSection">
        <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">☁ 雲端存檔</h3>
        <select id="savedClassSelect" class="w-full p-2 border rounded text-xs bg-white">
          <option value="">-- 選擇存檔 --</option>
        </select>
        <div class="flex gap-2">
          <button id="loadBtn" class="flex-1 bg-green-600 text-white py-2 rounded text-xs font-bold hover:bg-green-700 transition">載入</button>
          <button id="saveBtn" class="flex-1 bg-violet-600 text-white py-2 rounded text-xs font-bold hover:bg-violet-700 transition flex items-center justify-center gap-1">
            <i data-lucide="save" class="w-3 h-3"></i>儲存
          </button>
        </div>
      </div>

      <!-- 班級設定 -->
      <div class="space-y-3">
        <h3 class="text-[10px] font-bold text-slate-600 uppercase tracking-wider border-b pb-1">班級設定</h3>
        <input id="classTitle" type="text" value="113學年度 資二甲 座位表" class="w-full p-2 border rounded text-sm focus:ring-2 focus:ring-blue-400 outline-none"/>
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="text-[10px] text-slate-400 block mb-1">欄數（左右，最多7）</label>
            <input id="colsInput" type="number" value="6" min="1" max="7" class="w-full p-2 border rounded text-center text-sm"/>
          </div>
          <div class="flex-1">
            <label class="text-[10px] text-slate-400 block mb-1">列數（前後，最多7）</label>
            <input id="rowsInput" type="number" value="5" min="1" max="7" class="w-full p-2 border rounded text-center text-sm"/>
          </div>
        </div>
        <label class="text-[11px] font-bold text-blue-500 block">學生名單（支援從 Excel 直接複製貼上！）</label>
        <textarea id="studentList" rows="7" class="w-full p-2 border rounded text-xs font-mono leading-tight" placeholder="01 王小明&#10;02 李小花&#10;03 陳大文"></textarea>
        <button id="shuffleBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 hover:bg-blue-700 transition">
          <i data-lucide="shuffle" class="w-4 h-4"></i>隨機排位（保留鎖定）
        </button>
      </div>

      <!-- 幹部 (擴充為 14 個) -->
      <div class="space-y-2">
        <h3 class="text-[10px] font-bold text-slate-600 uppercase tracking-wider">幹部資料</h3>
        <div id="officersGrid" class="grid grid-cols-2 gap-2"></div>
      </div>

      <!-- 備註 -->
      <div class="space-y-1">
        <h3 class="text-[10px] font-bold text-slate-600 uppercase tracking-wider">導師備註</h3>
        <textarea id="memoInput" rows="4" class="w-full p-2 border rounded text-xs" placeholder="說明事項..."></textarea>
      </div>

      <!-- 操作按鈕 -->
      <div class="space-y-2 pt-1">
        <button id="exportBtn" class="w-full bg-amber-500 text-white py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-amber-600 transition text-sm">
          <i data-lucide="camera" class="w-4 h-4"></i>匯出圖片 (PNG)
        </button>
        <button id="exportPdfBtn" class="w-full bg-rose-600 text-white py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-rose-700 transition text-sm">
          <i data-lucide="file-text" class="w-4 h-4"></i>匯出 A4 PDF
        </button>
        <button id="resetBtn" class="w-full bg-red-600 text-white py-2 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-red-700 transition text-sm">
          <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>重設所有欄位
        </button>
      </div>
    </div>
  </aside>

  <!-- 預覽區 -->
  <main class="flex-1 overflow-auto bg-slate-500 p-6 flex justify-center items-start">
    <!-- 完美 A4 比例容器 (794x1123, 內距 38px 剛好約為 1 公分) -->
    <div id="captureArea" class="w-[794px] h-[1123px] shrink-0 bg-white shadow-2xl p-[38px] flex flex-col text-black mx-auto overflow-hidden relative">

      <!-- 標題 -->
      <h1 id="previewTitle" class="text-center text-3xl font-black pb-3 mb-6 border-b-[3px] border-black tracking-[0.2em] shrink-0">113學年度 資二甲 座位表</h1>

      <!-- 講桌 -->
      <div class="flex justify-center mb-6 shrink-0">
        <div class="w-56 h-12 border-[3px] border-black flex items-center justify-center font-bold text-xl bg-slate-50">講　桌  👨‍🏫</div>
      </div>

      <!-- 下方主內容區 (左側：座位+幹部+備註，右側：名單拉長至底部) -->
      <div class="flex gap-4 flex-1 min-h-0">
        
        <!-- 左側：排版區 -->
        <div class="flex-1 flex flex-col gap-5 min-w-0">
          
          <!-- 座位格 -->
          <div id="seatGrid" class="grid gap-2 shrink-0"></div>

          <!-- 幹部表 (擴充為 7 欄，共 14 格) -->
          <div id="officersTable" class="grid grid-cols-7 border-t-[3px] border-l-[3px] border-black mt-auto shrink-0"></div>

          <!-- 備註區 (文字放大至 text-[19px]) -->
          <div id="memoDisplay" class="border-[3px] border-black p-4 pt-5 min-h-[85px] text-[19px] leading-relaxed whitespace-pre-wrap relative bg-white italic font-medium shrink-0">
            <span class="absolute -top-[14px] left-4 bg-white px-2 text-[11px] font-black uppercase tracking-widest border-[3px] border-black">導師備註說明區</span>
            暫無說明事項。
          </div>
        </div>

        <!-- 右側：名單 (直達底部，充足空間) -->
        <div class="w-[105px] border-[3px] border-black flex flex-col self-stretch bg-white overflow-hidden shrink-0">
          <div class="bg-black text-white text-center py-1.5 font-bold text-[13px] tracking-widest shrink-0">座號名單</div>
          <div id="nameList" class="flex-1 p-1 font-bold overflow-hidden flex flex-col gap-[1px]"></div>
        </div>
      </div>

      <!-- 版權聲明 (置於 A4 最底部) -->
      <div class="text-center text-[12px] text-gray-400 font-bold mt-4 shrink-0 tracking-widest">
        設計者By Chen Yiju & AI 
      </div>
    </div>
  </main>
</div>

<!-- 座位編輯 Modal -->
<div id="seatModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-xs space-y-4">
    <h3 class="font-bold border-b pb-2 flex justify-between text-slate-800">編輯座位 <span id="modalSeatNum" class="text-slate-400">#1</span></h3>
    <div>
      <label class="text-[10px] font-black text-slate-400 block mb-1 uppercase">座號</label>
      <input id="modalNo" type="text" class="w-full p-2 border-2 rounded-lg focus:border-blue-500 outline-none font-bold"/>
    </div>
    <div>
      <label class="text-[10px] font-black text-slate-400 block mb-1 uppercase">學生姓名</label>
      <input id="modalName" type="text" class="w-full p-2 border-2 rounded-lg focus:border-blue-500 outline-none font-bold text-lg"/>
    </div>
    <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-lg border">
      <input type="checkbox" id="modalFixed" class="w-5 h-5 cursor-pointer accent-blue-600"/>
      <label for="modalFixed" class="font-bold cursor-pointer text-slate-700 text-sm">🔒 鎖定此位置</label>
    </div>
    <div class="flex gap-2">
      <button id="modalCancel" class="flex-1 py-2.5 bg-slate-100 rounded-xl text-sm font-bold hover:bg-slate-200">取消</button>
      <button id="modalSave" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">儲存</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== 你的 Firebase 設定 =====
const firebaseConfig = {
  apiKey: "AIzaSyAzn6LMMuRuDdes0u1pQZZapgCIZi-ivZg",
  authDomain: "teachseat-e04a1.firebaseapp.com",
  projectId: "teachseat-e04a1",
  storageBucket: "teachseat-e04a1.firebasestorage.app",
  messagingSenderId: "91449526838",
  appId: "1:91449526838:web:802655d5f909f8e840a697"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ===== 常數 (擴增為 14 名幹部) =====
const OFFICERS = ["班長","副班長","風紀","學藝","衛生(內)","衛生(外)","體育","事務","環保","輔導","實習","圖書","康樂","評分員",];

// ===== 狀態 =====
let layout = [];
let cols = 6, rows = 5;
let savedClasses = [];
let editingIdx = null;
let draggedIdx = null;
let currentUser = null;

// ===== 初始化 Lucide =====
lucide.createIcons();

// ===== 幹部欄位初始化 =====
const officersGrid = document.getElementById('officersGrid');
OFFICERS.forEach((title, i) => {
  const div = document.createElement('div');
  div.innerHTML = `<div class="text-[9px] text-gray-400 ml-1 font-bold mb-0.5">${title}</div>
    <input type="text" id="officer_${i}" class="w-full p-1.5 border rounded text-xs" placeholder="${title}"/>`;
  officersGrid.appendChild(div);
});

// ===== 網格初始化 =====
function initLayout() {
  const count = cols * rows;
  const prev = [...layout];
  layout = Array.from({length: count}, (_, i) => prev[i] || {no:'', name:'', fixed:false});
}

function renderGrid() {
  const grid = document.getElementById('seatGrid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';
  
  // 依照欄數自動調降文字大小，避免 7 欄時太擠
  const nameFontSize = cols >= 7 ? '14px' : (cols === 6 ? '17px' : '20px');
  const noFontSize = cols >= 7 ? '12px' : '14px';

  layout.forEach((seat, i) => {
    const div = document.createElement('div');
    div.className = `seat border-2 border-black flex flex-col relative group ${seat.fixed ? 'bg-yellow-50' : 'bg-white'}`;
    // 微調寬高比，讓 7 列時有更好的伸縮空間
    div.style.aspectRatio = '1/0.85';
    div.draggable = !!seat.name;
    div.dataset.idx = i;
    
    // 移除多餘的 div，直接在 Flex 容器加上 leading-none (單行高)，達到最精準的數學垂直置中
    div.innerHTML = `
      <div class="h-[30%] border-b-2 border-black flex items-center justify-center bg-slate-100 font-bold leading-none text-center" style="font-size:${noFontSize}">
        ${seat.no}
      </div>
      <div class="h-[70%] flex items-center justify-center px-1 overflow-hidden font-black leading-none text-center whitespace-nowrap" style="font-size:${nameFontSize}">
        ${seat.name}
      </div>
      <button class="lock-btn absolute top-0 right-0 p-0.5 opacity-0 group-hover:opacity-100 no-print ${seat.fixed?'text-amber-500':'text-slate-300'}" data-idx="${i}" style="z-index: 10;" data-html2canvas-ignore="true">
        ${seat.fixed ? '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>'}
      </button>`;
      
    div.addEventListener('click', (e) => {
      if (e.target.closest('.lock-btn')) return;
      openModal(i);
    });
    div.querySelector('.lock-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      layout[i].fixed = !layout[i].fixed;
      renderGrid();
    });
    div.addEventListener('dragstart', (e) => {
      draggedIdx = i;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', (e) => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (draggedIdx === null || draggedIdx === i) return;
      const tmp = {...layout[draggedIdx]};
      layout[draggedIdx] = {...layout[i]};
      layout[i] = tmp;
      draggedIdx = null;
      renderGrid();
    });
    grid.appendChild(div);
  });
  renderOfficersTable();
  renderNameList();
}

function renderOfficersTable() {
  const table = document.getElementById('officersTable');
  table.innerHTML = '';
  OFFICERS.forEach((title, i) => {
    const val = document.getElementById(`officer_${i}`)?.value || '';
    const cell = document.createElement('div');
    // 增加 min-h，並移除 truncate，改用 break-words 與 leading-snug 確保姓名不被砍腳
    cell.className = 'border-r-[3px] border-b-[3px] border-black p-2 min-h-[65px] text-center bg-white flex flex-col items-center justify-center gap-1.5';
    cell.innerHTML = `
      <div class="text-[11px] font-bold text-gray-500 leading-snug">${title}</div>
      <div class="text-[15px] font-bold w-full leading-snug break-words">${val}</div>`;
    table.appendChild(cell);
  });
}

function renderNameList() {
  const el = document.getElementById('nameList');
  const raw = document.getElementById('studentList').value;
  const lines = raw.split('\n').filter(l=>l.trim());
  el.innerHTML = lines.map(l => {
    // 智慧拆分：不管是空白或 Excel 複製來的 Tab (跳格) 都能完美解析
    const p = l.trim().split(/\s+/);
    const str = p[0] + (p.length > 1 ? ' ' + p.slice(1).join(' ') : '');
    return `<div class="border-b border-slate-200 py-[3px] px-1 truncate text-center text-[13px] leading-tight">${str}</div>`;
  }).join('');
}

// ===== 動態更新標題/備註預覽 =====
document.getElementById('classTitle').addEventListener('input', e => {
  document.getElementById('previewTitle').textContent = e.target.value;
});
document.getElementById('memoInput').addEventListener('input', e => {
  document.getElementById('memoDisplay').innerHTML = `
    <span class="absolute -top-[14px] left-4 bg-white px-2 text-[11px] font-black uppercase tracking-widest border-[3px] border-black">導師備註說明區</span>
    ${e.target.value || '暫無說明事項。'}
  `;
});

// 當正在輸入或貼上時即時更新
document.getElementById('studentList').addEventListener('input', () => { 
  renderNameList(); 
});

// 重點優化：當滑鼠離開輸入框時，自動將 Excel 的 Tab 轉換為單一空白，保持文字區塊乾淨整齊
document.getElementById('studentList').addEventListener('blur', (e) => {
  const raw = e.target.value;
  if (!raw) return;
  e.target.value = raw.split('\n')
    .filter(l => l.trim())
    .map(l => {
      const p = l.trim().split(/\s+/);
      return p[0] + ' ' + p.slice(1).join(' '); // 強制轉換為一個半形空白
    })
    .join('\n');
  renderNameList();
});

OFFICERS.forEach((_, i) => {
  document.getElementById(`officer_${i}`)?.addEventListener('input', renderOfficersTable);
});
document.getElementById('colsInput').addEventListener('change', e => {
  cols = Math.min(7, Math.max(1, parseInt(e.target.value)||1));
  e.target.value = cols;
  initLayout(); renderGrid();
});
document.getElementById('rowsInput').addEventListener('change', e => {
  rows = Math.min(7, Math.max(1, parseInt(e.target.value)||1));
  e.target.value = rows;
  initLayout(); renderGrid();
});

// ===== Modal =====
function openModal(idx) {
  editingIdx = idx;
  const seat = layout[idx];
  document.getElementById('modalSeatNum').textContent = `#${idx+1}`;
  document.getElementById('modalNo').value = seat.no;
  document.getElementById('modalName').value = seat.name;
  document.getElementById('modalFixed').checked = seat.fixed;
  document.getElementById('seatModal').classList.remove('hidden');
}
document.getElementById('modalCancel').onclick = () => document.getElementById('seatModal').classList.add('hidden');
document.getElementById('modalSave').onclick = () => {
  if (editingIdx === null) return;
  layout[editingIdx] = {
    no: document.getElementById('modalNo').value,
    name: document.getElementById('modalName').value,
    fixed: document.getElementById('modalFixed').checked
  };
  document.getElementById('seatModal').classList.add('hidden');
  renderGrid();
};

// ===== 隨機排位 =====
document.getElementById('shuffleBtn').onclick = () => {
  const students = document.getElementById('studentList').value.split('\n')
    .filter(l=>l.trim()).map(l => {
      const p = l.trim().split(/\s+/);
      return {no: p[0]||'', name: p.slice(1).join(' ')||''};
    }).sort(() => Math.random()-0.5);
  let si = 0;
  layout.forEach((seat, i) => {
    if (!seat.fixed) {
      if (si < students.length) {
        layout[i] = {...seat, no: students[si].no, name: students[si].name};
        si++;
      } else {
        layout[i] = {...seat, no:'', name:''};
      }
    }
  });
  renderGrid();
};

// ===== 重設 =====
document.getElementById('resetBtn').onclick = () => {
  if (!confirm('確定要重設所有欄位？')) return;
  document.getElementById('classTitle').value = '114學年度 某某班 座位表';
  document.getElementById('previewTitle').textContent = '113學年度 某某班 座位表';
  document.getElementById('studentList').value = '';
  document.getElementById('memoInput').value = '';
  document.getElementById('memoDisplay').innerHTML = `
    <span class="absolute -top-[14px] left-4 bg-white px-2 text-[11px] font-black uppercase tracking-widest border-[3px] border-black">導師備註說明區</span>
    暫無說明事項。
  `;
  OFFICERS.forEach((_,i) => { const el = document.getElementById(`officer_${i}`); if(el) el.value=''; });
  layout = layout.map(s => ({no:'', name:'', fixed:false}));
  renderGrid();
};

// ===== 匯出圖片 =====
document.getElementById('exportBtn').onclick = async () => {
  const btn = document.getElementById('exportBtn');
  btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>匯出中...';
  lucide.createIcons();
  
  await new Promise((res) => {
    if (window.html2canvas) return res();
    const script = document.createElement('script');
    script.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
    script.onload = res;
    document.head.appendChild(script);
  });

  try {
    const canvas = await html2canvas(document.getElementById('captureArea'), {
      scale: 2, useCORS: true, backgroundColor: '#ffffff'
    });
    const link = document.createElement('a');
    link.download = `座位表_${document.getElementById('classTitle').value}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('圖片匯出失敗：' + e.message);
  } finally {
    btn.innerHTML = '<i data-lucide="camera" class="w-4 h-4"></i>匯出圖片 (PNG)';
    lucide.createIcons();
  }
};

// ===== 匯出 A4 PDF =====
document.getElementById('exportPdfBtn').onclick = async () => {
  const btn = document.getElementById('exportPdfBtn');
  btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>產生中...';
  lucide.createIcons();

  await new Promise((res) => {
    if (window.html2canvas) return res();
    const s = document.createElement('script');
    s.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
    s.onload = res;
    document.head.appendChild(s);
  });

  await new Promise((res) => {
    if (window.jspdf) return res();
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload = res;
    document.head.appendChild(s);
  });

  try {
    const canvas = await html2canvas(document.getElementById('captureArea'), {
      scale: 2, useCORS: true, backgroundColor: '#ffffff'
    });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    
    // 將我們已經等比例設計好的畫布，直接以 1:1 滿版貼上 A4，自帶 10mm 完美留白邊距
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
    
    const title = document.getElementById('classTitle').value || '座位表';
    pdf.save(`座位表_${title}.pdf`);
  } catch(e) {
    alert('PDF 匯出失敗：' + e.message);
  } finally {
    btn.innerHTML = '<i data-lucide="file-text" class="w-4 h-4"></i>匯出 A4 PDF';
    lucide.createIcons();
  }
};

// ===== 密碼顯示切換 =====
document.getElementById('togglePwd').onclick = () => {
  const inp = document.getElementById('passwordInput');
  const eyeOn = document.getElementById('eyeIcon');
  const eyeOff = document.getElementById('eyeOffIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    eyeOn.style.display = 'none';
    eyeOff.style.display = 'inline';
  } else {
    inp.type = 'password';
    eyeOn.style.display = 'inline';
    eyeOff.style.display = 'none';
  }
};

// ===== 身份驗證 =====
function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.remove('hidden');
}
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value;
  const pwd = document.getElementById('passwordInput').value;
  if (!email || !pwd) return showError('請填寫帳號與密碼');
  try { await signInWithEmailAndPassword(auth, email, pwd); }
  catch(e) { showError('登入失敗：' + (e.code === 'auth/invalid-credential' ? '帳號或密碼錯誤' : e.message)); }
};
document.getElementById('registerBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value;
  const pwd = document.getElementById('passwordInput').value;
  if (!email || !pwd) return showError('請填寫帳號與密碼');
  if (pwd.length < 6) return showError('密碼至少需要 6 個字元');
  try { await createUserWithEmailAndPassword(auth, email, pwd); }
  catch(e) { showError('註冊失敗：' + e.message); }
};
document.getElementById('anonBtn').onclick = async () => {
  try { await signInAnonymously(auth); }
  catch(e) { showError('進入失敗：' + e.message); }
};
document.getElementById('logoutBtn').onclick = () => signOut(auth);

// ===== Auth 狀態監聽 =====
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('flex');
    document.getElementById('userEmail').textContent = user.isAnonymous ? '訪客' : user.email;

    if (!user.isAnonymous) {
      document.getElementById('cloudSection').classList.remove('opacity-40', 'pointer-events-none');
      const q = collection(db, 'seatapp', user.uid, 'classes');
      onSnapshot(q, (snap) => {
        savedClasses = [];
        snap.forEach(d => savedClasses.push({id: d.id, ...d.data()}));
        const sel = document.getElementById('savedClassSelect');
        const cur = sel.value;
        sel.innerHTML = '<option value="">-- 選擇存檔 --</option>';
        savedClasses.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.id;
          sel.appendChild(opt);
        });
        sel.value = cur;
      });
    } else {
      document.getElementById('cloudSection').classList.add('opacity-40', 'pointer-events-none');
    }

    initLayout();
    renderGrid();
    lucide.createIcons();
  } else {
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('flex');
  }
});

// ===== 雲端儲存 =====
document.getElementById('saveBtn').onclick = async () => {
  if (!currentUser || currentUser.isAnonymous) return alert('請先登入才能使用雲端儲存');
  const title = document.getElementById('classTitle').value.trim();
  if (!title) return alert('請輸入班級名稱');
  const officerVals = OFFICERS.map((_,i) => document.getElementById(`officer_${i}`)?.value||'');
  try {
    await setDoc(doc(db, 'seatapp', currentUser.uid, 'classes', title), {
      title, cols, rows,
      studentListRaw: document.getElementById('studentList').value,
      memo: document.getElementById('memoInput').value,
      officers: officerVals, layout,
      updatedAt: Date.now()
    });
    alert('儲存成功！');
  } catch(e) {
    console.error(e);
    alert('儲存失敗：' + e.message + '\n\n請至 Firebase Console → Firestore → Rules 設定讀寫權限。');
  }
};

// ===== 載入存檔 =====
document.getElementById('loadBtn').onclick = () => {
  const id = document.getElementById('savedClassSelect').value;
  const data = savedClasses.find(c => c.id === id);
  if (!data) return alert('請選擇存檔');
  document.getElementById('classTitle').value = data.title;
  document.getElementById('previewTitle').textContent = data.title;
  cols = data.cols; rows = data.rows;
  document.getElementById('colsInput').value = cols;
  document.getElementById('rowsInput').value = rows;
  document.getElementById('studentList').value = data.studentListRaw || '';
  document.getElementById('memoInput').value = data.memo || '';
  document.getElementById('memoDisplay').innerHTML = `
    <span class="absolute -top-[14px] left-4 bg-white px-2 text-[11px] font-black uppercase tracking-widest border-[3px] border-black">導師備註說明區</span>
    ${data.memo || '暫無說明事項。'}
  `;
  (data.officers||[]).forEach((v,i) => { const el = document.getElementById(`officer_${i}`); if(el) el.value=v; });
  layout = data.layout || [];
  renderGrid();
  renderNameList();
};

</script>
</body>
