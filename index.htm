<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端考試座位管理系統 - 專業協作版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fixed: #ffeaa7; --fixed-border: #b45309; 
            --primary: #2563eb; --primary-dark: #1d4ed8;
            --bg: #f0f4ff; --surface: #ffffff;
            --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --purple: #7c3aed;
            --text: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0;
            --sidebar-w: 360px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text);
        }

        .sidebar {
            width: var(--sidebar-w); background: var(--surface);
            box-shadow: 4px 0 24px rgba(0,0,0,0.04);
            overflow-y: auto; display: flex; flex-direction: column; flex-shrink: 0;
            border-right: 1px solid #f1f5f9;
        }

        .sidebar-header { 
            padding: 28px 24px 20px; 
            border-bottom: 1px solid #f1f5f9; 
            position: sticky; top: 0; 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(8px);
            z-index: 10; 
        }
        .role-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 800; margin-bottom: 14px; letter-spacing: 0.5px; }
        .role-badge.admin { background: #dbeafe; color: #1d4ed8; }
        .role-badge.teacher { background: #f3e8ff; color: #6b21a8; }
        .user-display-name { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }

        .sidebar-body { padding: 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 18px; }
        
        .config-group { background: #f8fafc; border: none; border-radius: 16px; padding: 20px; transition: 0.2s; }
        .config-group:hover { background: #f1f5f9; }
        .config-group h3 { margin: 0 0 16px 0; font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: #334155; }

        label { font-size: 13px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 6px; }
        
        input, textarea, select { 
            width: 100%; padding: 12px 14px; border: 1.5px solid #cbd5e1; border-radius: 10px; 
            font-size: 14px; margin-bottom: 12px; background: #ffffff; transition: all 0.2s ease; 
            font-family: inherit; color: #0f172a;
        }
        /* 導師被鎖定時的樣式 */
        .locked-input { background: #e2e8f0 !important; cursor: not-allowed !important; color: #64748b !important; pointer-events: none; }

        button { 
            width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 10px; 
            cursor: pointer; font-weight: 800; transition: all 0.2s ease; display: flex; 
            align-items: center; justify-content: center; gap: 8px; font-family: inherit; font-size: 14px;
        }
        button:hover { filter: brightness(0.92); transform: translateY(-1px); }
        
        .btn-new { background: #fee2e2; color: #b91c1c; }
        .btn-cloud { background: #dbeafe; color: #1d4ed8; }
        .btn-load { background: #d1fae5; color: #065f46; }
        .btn-init { background: var(--text); color: white; }
        .btn-shuffle { background: var(--primary); color: white; }
        .btn-img { background: #fef3c7; color: #92400e; }
        .btn-pdf { background: #fee2e2; color: #b91c1c; }
        .btn-batch { background: #e0e7ff; color: #3730a3; }
        .btn-out { background: #f1f5f9; color: var(--text-muted); }

        .main-content { flex-grow: 1; display: flex; align-items: flex-start; justify-content: center; overflow: auto; padding: 40px; background: #e2e8f0; }
        
        /* 列印區域核心修正 */
        #capture-area { 
            background: white; 
            padding: 60px 50px; 
            border-radius: 8px; 
            width: 794px; /* A4 比例 */
            min-height: 1123px; 
            position: relative; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }
        #class-title-display { text-align: center; font-size: 2.8rem; margin: 0 0 20px 0; font-weight: 900; color: #0f172a; }

        .teacher-desk { width: 180px; padding: 12px; margin: 0 auto 30px auto; background-color: #f8fafc; border: 2px solid #475569; border-radius: 10px; text-align: center; font-weight: 800; }

        .grid { display: grid; gap: 10px; justify-content: center; margin-bottom: 40px; }
        .seat {
            width: 100px; height: 75px; border: 2px solid #475569; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; background: #fff; cursor: grab; transition: 0.2s;
        }
        .seat.is-fixed { background: var(--fixed); border-color: var(--fixed-border); }
        .student-name { font-size: 1.15rem; font-weight: 700; text-align: center; word-break: break-all; }

        /* 修正備註截斷：改用可編輯 div 並取消固定高度與捲軸 */
        .remarks-container { margin-top: auto; border-top: 2px solid #1e293b; padding-top: 20px; }
        .remarks-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; color: #0f172a; }
        
        #class-remarks-div {
            width: 100%;
            min-height: 100px;
            border: 2px dashed #cbd5e1;
            padding: 15px;
            font-size: 1rem;
            line-height: 1.6;
            color: #1e293b;
            white-space: pre-wrap; /* 保留換行 */
            word-wrap: break-word;
            border-radius: 8px;
            outline: none;
            background: #fff;
        }
        #class-remarks-div:focus { border-color: var(--primary); background: #f8fafc; }

        #auth-overlay, #loading-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .auth-box { background: white; padding: 40px; border-radius: 24px; width: 400px; text-align: center; }
        .hidden { display: none !important; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 12px 24px; border-radius: 10px; opacity: 0; transition: 0.3s; z-index: 9999; font-weight: 700; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">🏫 座位管理系統登入</h2>
        <div style="text-align:left; margin-top:20px;">
            <label>中文姓名 / 帳號</label>
            <input type="text" id="auth-username" placeholder="請輸入姓名">
            <label>密碼</label>
            <input type="password" id="auth-password" placeholder="請輸入密碼">
        </div>
        <button class="btn-init" style="background:var(--primary); margin-top:15px;" id="btn-auth-action" onclick="handleAuth()">🔐 登入系統</button>
        <div style="margin-top:15px; font-size:14px; color:var(--primary); cursor:pointer;" onclick="toggleAuthMode()" id="auth-switch-text">註冊帳號</div>
    </div>
</div>

<div id="loading-overlay" class="hidden">
    <div style="background: white; padding: 30px 50px; border-radius: 12px; text-align: center;">
        <h2 style="color: var(--primary); margin:0;">⏳ 處理中</h2>
        <p id="loading-text">正在生成佈局...</p>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="role-badge" id="role-badge">讀取中</div>
        <div class="user-display-name" id="user-display-name">使用者</div>
        <div id="user-sub-info" style="font-size:12px; color:var(--text-muted);"></div>
    </div>

    <div class="sidebar-body">
        <!-- 管理者功能隱藏 -->
        <div id="admin-only-section" style="display:none;">
            <div class="config-group" style="background:#f5f3ff;">
                <h3>🛡️ 協作權限</h3>
                <label>選擇對象</label>
                <select id="setup-username-select"><option value="">載入中...</option></select>
                <button onclick="assignRole('teacher')" class="btn-init" style="background:var(--primary);">指派導師</button>
                <label>負責班級</label>
                <select id="setup-class"><option value="">選擇班級</option></select>
            </div>
        </div>

        <div class="config-group">
            <h3>🗂️ 班級管理</h3>
            <button class="btn-new" id="btn-new" onclick="createNewClass()" style="display:none;">➕ 建立新班級</button>
            <select id="classDropdown"><option value="">-- 選擇班級 --</option></select>
            <div class="btn-row" style="display:flex; gap:10px;">
                <button class="btn-load" onclick="loadFromDropdown()">📂 載入</button>
                <button class="btn-cloud" onclick="saveToCloud()">☁️ 儲存</button>
            </div>
            <div class="btn-row" style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn-img" onclick="downloadImage()">🖼️ 圖片</button>
                <button class="btn-pdf" onclick="downloadPDF()">📄 PDF</button>
            </div>
        </div>

        <div class="config-group" id="layout-group">
            <h3>✏️ 教室配置</h3>
            <label>班級名稱</label>
            <input type="text" id="classTitle" oninput="syncTitle()" placeholder="例如：資三乙">
            <div style="display:flex;gap:10px;">
                <div style="flex:1;"><label>欄</label><input type="number" id="cols" value="5" min="1" max="7"></div>
                <div style="flex:1;"><label>列</label><input type="number" id="rows" value="5" min="1" max="7"></div>
            </div>
            <button class="btn-init" id="btn-init" onclick="confirmInit()">🔄 重置佈局</button>
        </div>

        <div class="config-group" id="shuffle-group">
            <h3>🎲 學生名單</h3>
            <label>名單內容 (導師不可更動)</label>
            <!-- 導師登入時，此處會被強制鎖定 -->
            <textarea id="studentList" placeholder="每行一位姓名..." style="height:120px;"></textarea>
            <button class="btn-shuffle" onclick="shuffleNonFixed()">🎲 隨機排位</button>
        </div>

        <button class="btn-out" onclick="handleLogout()" style="margin-top:auto;">🚪 登出系統</button>
    </div>
</div>

<div class="main-content">
    <div id="capture-area">
        <h1 id="class-title-display">請輸入班級名稱</h1>
        <div class="teacher-desk">👨‍🏫 講桌</div>
        <div id="grid" class="grid"></div>
        <div class="remarks-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <label class="remarks-title">📝 備註事項 / 考試說明</label>
                <span id="student-count-display" style="font-size:14px; font-weight:800; color:var(--primary);">人數：0</span>
            </div>
            <!-- 使用 div contenteditable 解決截斷問題 -->
            <div id="class-remarks-div" contenteditable="true" placeholder="在此輸入備註..."></div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBUqcJTmApajA1-KfGT6QbXMDUuKBkBngk",
  authDomain: "newseat2-a4a11.firebaseapp.com",
  projectId: "newseat2-a4a11",
  storageBucket: "newseat2-a4a11.firebasestorage.app",
  messagingSenderId: "604055111582",
  appId: "1:604055111582:web:df3fb3f4c547d7f720b88f"
};


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null, currentRole = null, currentUsername = "", assignedClass = "", mainAdminUID = null;
    let draggedElement = null, isRegisterMode = false;

    const usernameToEmail = (u) => `${u.trim()}@school.local`;
    const showToast = (m) => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); };

    // 核心鎖定邏輯：強制導師不能改動名單
    function lockTeacherPermissions() {
        const isAdmin = (currentRole === 'admin');
        const listInput = document.getElementById('studentList');
        const titleInput = document.getElementById('classTitle');
        const initBtn = document.getElementById('btn-init');
        const colsInput = document.getElementById('cols');
        const rowsInput = document.getElementById('rows');

        if (!isAdmin) {
            // 強制鎖定名單文字框
            listInput.readOnly = true;
            listInput.classList.add('locked-input');
            listInput.title = "導師權限：禁止修改原始名單";
            
            // 鎖定班級標題與格數
            titleInput.readOnly = true;
            titleInput.classList.add('locked-input');
            colsInput.readOnly = true;
            colsInput.classList.add('locked-input');
            rowsInput.readOnly = true;
            rowsInput.classList.add('locked-input');
            
            initBtn.style.display = 'none'; // 隱藏重置按鈕
        } else {
            listInput.readOnly = false;
            listInput.classList.remove('locked-input');
            titleInput.readOnly = false;
            titleInput.classList.remove('locked-input');
            colsInput.readOnly = false;
            colsInput.classList.remove('locked-input');
            rowsInput.readOnly = false;
            rowsInput.classList.remove('locked-input');
            initBtn.style.display = 'block';
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-overlay').classList.add('hidden');
            const nameDoc = await getDoc(doc(db, 'usernames', user.email));
            currentUsername = nameDoc.exists() ? nameDoc.data().displayName : user.email.split('@')[0];
            document.getElementById('user-display-name').innerText = currentUsername;

            const rDoc = await getDoc(doc(db, 'roles', user.email));
            if(rDoc.exists()){
                const rd = rDoc.data();
                currentRole = rd.role;
                assignedClass = rd.class || "";
                mainAdminUID = rd.sharedWith || user.uid;
            } else {
                currentRole = 'teacher';
                mainAdminUID = user.uid;
            }

            applyRoleUI(); refreshClassList(); initGrid();
            lockTeacherPermissions(); // 登入後立即檢查鎖定
        } else {
            document.getElementById('auth-overlay').classList.remove('hidden');
        }
    });

    function applyRoleUI() {
        const isAdmin = currentRole === 'admin';
        document.getElementById('role-badge').innerText = isAdmin ? "🛡️ 管理者" : "👨‍🏫 導師";
        document.getElementById('role-badge').className = "role-badge " + (isAdmin ? "admin" : "teacher");
        document.getElementById('admin-only-section').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('btn-new').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('user-sub-info').innerText = isAdmin ? "" : `指派班級：${assignedClass}`;
        
        if(!isAdmin && assignedClass) {
            document.getElementById('classTitle').value = assignedClass;
            syncTitle();
        }
    }

    window.syncTitle = () => {
        const t = document.getElementById('classTitle').value;
        document.getElementById('class-title-display').innerText = t ? `${t} 考試座位表` : "未設定班級";
    };

    window.confirmInit = () => { if(confirm('確定要清除目前的排列重新開始嗎？')) initGrid(); };

    window.initGrid = () => {
        const c = parseInt(document.getElementById('cols').value) || 5;
        const r = parseInt(document.getElementById('rows').value) || 5;
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${c}, 100px)`;
        grid.innerHTML = '';
        for(let i=0; i<c*r; i++) grid.appendChild(createSeat("", false));
        updateCount();
    };

    function createSeat(name, fixed) {
        const div = document.createElement('div');
        div.className = 'seat' + (fixed ? ' is-fixed' : '');
        div.draggable = true;
        div.innerHTML = `<span class="student-name">${name}</span>`;
        
        div.onclick = () => {
            const old = div.querySelector('.student-name').innerText;
            const n = prompt("修改姓名：", old);
            if(n !== null) { div.querySelector('.student-name').innerText = n.trim(); updateCount(); }
        };
        div.oncontextmenu = (e) => { e.preventDefault(); div.classList.toggle('is-fixed'); };
        div.ondragstart = () => { draggedElement = div; div.style.opacity = "0.4"; };
        div.ondragend = () => { draggedElement = null; div.style.opacity = "1"; };
        div.ondragover = (e) => e.preventDefault();
        div.ondrop = (e) => {
            if(draggedElement && draggedElement !== div) {
                const tN = div.querySelector('.student-name').innerText, tF = div.classList.contains('is-fixed');
                div.querySelector('.student-name').innerText = draggedElement.querySelector('.student-name').innerText;
                if(draggedElement.classList.contains('is-fixed')) div.classList.add('is-fixed'); else div.classList.remove('is-fixed');
                draggedElement.querySelector('.student-name').innerText = tN;
                if(tF) draggedElement.classList.add('is-fixed'); else draggedElement.classList.remove('is-fixed');
            }
        };
        return div;
    }

    function updateCount() {
        const count = Array.from(document.querySelectorAll('.student-name')).filter(s => s.innerText.trim()).length;
        document.getElementById('student-count-display').innerText = `人數：${count}`;
    }

    async function refreshClassList() {
        const drop = document.getElementById('classDropdown'), sDrop = document.getElementById('setup-class');
        drop.innerHTML = '<option value="">-- 選擇班級 --</option>';
        sDrop.innerHTML = '<option value="">選擇班級</option>';
        const snap = await getDocs(collection(db, 'users', mainAdminUID, 'classes'));
        snap.forEach(d => {
            const opt = document.createElement('option'); opt.value = d.id; opt.innerText = d.id;
            drop.appendChild(opt); sDrop.appendChild(opt.cloneNode(true));
        });
    }

    window.saveToCloud = async () => {
        const title = document.getElementById('classTitle').value.trim();
        if(!title) return alert('請輸入班級名稱');
        if(currentRole === 'teacher' && title !== assignedClass) return alert('你只能儲存指派的班級');

        const seats = Array.from(document.querySelectorAll('.seat')).map(s => ({
            name: s.querySelector('.student-name').innerText,
            fixed: s.classList.contains('is-fixed')
        }));

        await setDoc(doc(db, 'users', mainAdminUID, 'classes', title), {
            cols: document.getElementById('cols').value,
            rows: document.getElementById('rows').value,
            remarks: document.getElementById('class-remarks-div').innerText,
            seats,
            lastEditedBy: currentUsername,
            lastEditedAt: new Date().toISOString()
        });
        showToast('✅ 雲端儲存成功');
        refreshClassList();
    };

    window.loadFromDropdown = async () => {
        const s = document.getElementById('classDropdown').value;
        if(!s) return;
        if(currentRole === 'teacher' && s !== assignedClass) return alert('導師僅限存取指派班級');
        
        const d = await getDoc(doc(db, 'users', mainAdminUID, 'classes', s));
        if(d.exists()) {
            const data = d.data();
            document.getElementById('cols').value = data.cols;
            document.getElementById('rows').value = data.rows;
            document.getElementById('class-remarks-div').innerText = data.remarks || "";
            document.getElementById('classTitle').value = s;
            syncTitle();
            
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${data.cols}, 100px)`;
            grid.innerHTML = '';
            
            const nameList = [];
            data.seats.forEach(sd => {
                grid.appendChild(createSeat(sd.name, sd.fixed));
                if(sd.name) nameList.push(sd.name);
            });
            document.getElementById('studentList').value = nameList.join('\n');
            updateCount();
            lockTeacherPermissions(); // 載入後再次確認鎖定
            showToast(`已載入 ${s} 佈局`);
        }
    };

    window.shuffleNonFixed = () => {
        const raw = document.getElementById('studentList').value.split('\n').map(s => s.trim()).filter(s => s);
        if(!raw.length) return alert('名單是空的');
        const avai = Array.from(document.querySelectorAll('.seat')).filter(s => !s.classList.contains('is-fixed'));
        if(raw.length > avai.length) return alert('位置不夠放！');
        
        avai.forEach(s => s.querySelector('.student-name').innerText = "");
        [...raw].sort(()=>Math.random()-0.5).forEach((n, i) => {
            avai[i].querySelector('.student-name').innerText = n;
        });
        showToast('🎲 隨機排位完成');
    };

    window.downloadPDF = async () => {
        document.getElementById('loading-overlay').classList.remove('hidden');
        try {
            const canvas = await html2canvas(document.getElementById('capture-area'), { scale: 2 });
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const w = pdf.internal.pageSize.getWidth();
            const h = (canvas.height * w) / canvas.width;
            pdf.addImage(imgData, 'JPEG', 0, 0, w, h);
            pdf.save(`座位表_${document.getElementById('classTitle').value}.pdf`);
        } finally {
            document.getElementById('loading-overlay').classList.add('hidden');
        }
    };

    window.downloadImage = () => {
        html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
            const l = document.createElement('a');
            l.download = `座位表_${document.getElementById('classTitle').value}.png`;
            l.href = canvas.toDataURL(); l.click();
        });
    };

    // 其他 Auth 輔助函式
    window.handleAuth = async () => {
        const u = document.getElementById('auth-username').value;
        const p = document.getElementById('auth-password').value;
        if(!u || !p) return alert('請輸入完整內容');
        try {
            if(isRegisterMode) {
                await createUserWithEmailAndPassword(auth, usernameToEmail(u), p);
                await setDoc(doc(db, 'usernames', usernameToEmail(u)), { displayName: u });
            } else { await signInWithEmailAndPassword(auth, usernameToEmail(u), p); }
        } catch(e) { alert('驗證失敗，請檢查帳號密碼'); }
    };
    window.toggleAuthMode = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "📝 註冊系統帳號" : "🏫 座位管理系統登入";
        document.getElementById('auth-switch-text').innerText = isRegisterMode ? "已有帳號？登入" : "註冊帳號";
    };
    window.handleLogout = () => signOut(auth);
</script>

</body>
</html>
